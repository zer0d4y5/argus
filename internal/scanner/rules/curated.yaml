# Argus curated semgrep rules (the "argus/curated" ruleset).
#
# Every rule here earned its slot the same way a registry pack does: it
# catches a labeled PLANT in testdata/polyglot that every registry pack in
# the profile misses, proven by TestProfileRecall. Rules are reviewed
# detection policy, version-pinned with the binary, never fetched.
#
# Conventions:
#   - ids start with "argus-curated-" (the adapter strips semgrep's temp-path
#     prefix back to this stable id; see internal/scanner/curated.go).
#   - metadata.cwe uses the "CWE-n: Name" form the registry uses; the model
#     normalizes it to the bare id.
#   - Prefer shapes that cannot match the safe form of the same construct;
#     each class has a PLANT-FP safe-code counterpart in testdata/polyglot
#     that must stay unflagged.
rules:
  # ---- Python ----------------------------------------------------------
  - id: argus-curated-py-path-traversal-join
    languages: [python]
    severity: ERROR
    message: >
      File path built by joining a base directory with an unsanitized value
      and opened. A value containing "../" escapes the base directory.
      Sanitize with os.path.basename, or resolve and verify the path stays
      inside the base.
    metadata:
      cwe: "CWE-22: Improper Limitation of a Pathname to a Restricted Directory ('Path Traversal')"
      category: security
      confidence: MEDIUM
      references:
        - https://owasp.org/www-community/attacks/Path_Traversal
    patterns:
      - pattern: open(os.path.join($BASE, $NAME), ...)
      - metavariable-pattern:
          metavariable: $NAME
          patterns:
            - pattern: $NAME
            - pattern-not: '"..."'
            - pattern-not: os.path.basename(...)
            - pattern-not: secure_filename(...)
            - pattern-not: werkzeug.utils.secure_filename(...)

  # ---- Go --------------------------------------------------------------
  - id: argus-curated-go-shell-command-built
    languages: [go]
    severity: ERROR
    message: >
      Shell invoked with a command string built from variables. Anything an
      attacker controls in the string becomes shell syntax. Pass the program
      and its arguments directly to exec.Command instead of going through
      "sh -c".
    metadata:
      cwe: "CWE-78: Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
      category: security
      confidence: MEDIUM
    pattern-either:
      - pattern: exec.Command("sh", "-c", $A + $B)
      - pattern: exec.Command("bash", "-c", $A + $B)
      - pattern: exec.Command("sh", "-c", fmt.Sprintf(...))
      - pattern: exec.Command("bash", "-c", fmt.Sprintf(...))

  # ---- JavaScript / TypeScript ------------------------------------------
  - id: argus-curated-js-sqli-tainted-query
    languages: [javascript, typescript]
    severity: ERROR
    mode: taint
    message: >
      SQL query text reaches a query call from request input. Concatenated or
      interpolated input becomes SQL syntax. Use a parameterized query and
      bind the value.
    metadata:
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
      category: security
      confidence: MEDIUM
    pattern-sources:
      - pattern: req.query
      - pattern: req.params
      - pattern: req.body
    pattern-sinks:
      - patterns:
          - pattern: $QUERY
          - pattern-inside: $DB.query($QUERY, ...)

  # ---- Kotlin ------------------------------------------------------------
  - id: argus-curated-kt-sqli-concat
    languages: [kotlin]
    severity: ERROR
    message: >
      SQL executed from a string built by concatenation. Concatenated values
      become SQL syntax. Use a PreparedStatement with bound parameters.
    metadata:
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
      category: security
      confidence: MEDIUM
    pattern-either:
      - pattern: $STMT.executeQuery($A + $B)
      - pattern: $STMT.executeUpdate($A + $B)
      - pattern: $STMT.execute($A + $B)

  - id: argus-curated-kt-weak-random
    languages: [kotlin]
    severity: WARNING
    message: >
      java.util.Random is predictable; its output must not be used for
      tokens, session ids, or anything security-relevant. Use
      java.security.SecureRandom.
    metadata:
      cwe: "CWE-330: Use of Insufficiently Random Values"
      category: security
      confidence: MEDIUM
    pattern-either:
      - pattern: Random().$M(...)
      - pattern: java.util.Random().$M(...)

  # ---- PHP ---------------------------------------------------------------
  - id: argus-curated-php-extract-request
    languages: [php]
    severity: ERROR
    message: >
      extract() over request data turns every request parameter into a PHP
      variable, letting an attacker overwrite existing variables. Read the
      specific parameters you need instead.
    metadata:
      cwe: "CWE-621: Variable Extraction Error"
      category: security
      confidence: HIGH
    pattern-either:
      - pattern: extract($_GET)
      - pattern: extract($_POST)
      - pattern: extract($_REQUEST)
      - pattern: extract($_COOKIE)

  - id: argus-curated-php-weak-rand
    languages: [php]
    severity: WARNING
    message: >
      rand()/mt_rand() are predictable; their output must not be used for
      tokens or anything security-relevant. Use random_int() or
      random_bytes().
    metadata:
      cwe: "CWE-330: Use of Insufficiently Random Values"
      category: security
      confidence: MEDIUM
    pattern-either:
      - pattern: rand()
      - pattern: rand($MIN, $MAX)
      - pattern: mt_rand()
      - pattern: mt_rand($MIN, $MAX)

  # ---- Swift ---------------------------------------------------------------
  - id: argus-curated-swift-sqli-dynamic-query
    languages: [swift]
    severity: ERROR
    message: >
      SQL prepared from a dynamically built string. Interpolated values
      become SQL syntax. Prepare a constant statement with "?" placeholders
      and bind values with sqlite3_bind_*.
    metadata:
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
      category: security
      confidence: MEDIUM
    patterns:
      - pattern: sqlite3_prepare_v2($DB, $QUERY, ...)
      - metavariable-pattern:
          metavariable: $QUERY
          patterns:
            - pattern: $QUERY
            - pattern-not: '"..."'

  - id: argus-curated-swift-weak-hash-md5
    languages: [swift]
    severity: WARNING
    message: >
      CC_MD5 computes MD5, which is broken for any security purpose. Use
      SHA-256 or better (CryptoKit SHA256, or CC_SHA256).
    metadata:
      cwe: "CWE-328: Use of Weak Hash"
      category: security
      confidence: HIGH
    pattern: CC_MD5(...)

  - id: argus-curated-swift-trust-all-tls
    languages: [swift]
    severity: ERROR
    message: >
      URLCredential built directly from the challenge's serverTrust accepts
      any certificate, disabling TLS validation. Evaluate the trust (or use
      default handling) instead of unconditionally returning a credential.
    metadata:
      cwe: "CWE-295: Improper Certificate Validation"
      category: security
      confidence: MEDIUM
    pattern-either:
      - pattern: 'URLCredential(trust: $CHALLENGE.protectionSpace.serverTrust!)'
      - pattern: 'URLCredential(trust: $CHALLENGE.protectionSpace.serverTrust)'

  - id: argus-curated-swift-shell-command-built
    languages: [swift]
    severity: ERROR
    message: >
      Process arguments hand "-c" plus a concatenated string to a shell, so
      anything in the string becomes shell syntax. Run the program directly
      with a fixed argument array.
    metadata:
      cwe: "CWE-78: Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
      category: security
      confidence: MEDIUM
    pattern-either:
      - pattern: '$TASK.arguments = ["-c", $A + $B]'

  - id: argus-curated-swift-hardcoded-aws-key
    languages: [swift]
    severity: ERROR
    message: >
      Hardcoded AWS access key id. Credentials in source ship with the
      binary and leak with the repo. Move it to configuration or a secret
      store and rotate the key.
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      category: security
      confidence: HIGH
    patterns:
      - pattern: let $KEY = $VAL
      - metavariable-regex:
          metavariable: $VAL
          regex: '"AKIA[0-9A-Z]{16}"'

  # ---- Web and injection gaps (subagent-authored, earn-your-slot filtered) ----
  # SSRF, XXE, path traversal, open redirect, LDAP injection, unsafe
  # deserialization, weak crypto, and Go InsecureSkipVerify: each catches a
  # plant the standard registry packs miss (proven by TestProfileRecall).
  - id: argus-curated-py-ssrf-requests
    languages: [python]
    severity: ERROR
    message: >
      A URL built from a variable is passed to an HTTP client, allowing
      Server-Side Request Forgery. Validate and allowlist the destination host
      before making the request.
    metadata:
      cwe: "CWE-918: Server-Side Request Forgery (SSRF)"
      category: security
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: requests.get($URL, ...)
          - pattern: requests.post($URL, ...)
          - pattern: requests.request($METHOD, $URL, ...)
          - pattern: urllib.request.urlopen($URL, ...)
          - pattern: urllib.request.urlopen($URL)
      - pattern-not: requests.get("...", ...)
      - pattern-not: requests.post("...", ...)
      - pattern-not: requests.request($METHOD, "...", ...)
      - pattern-not: urllib.request.urlopen("...", ...)
      - pattern-not: urllib.request.urlopen("...")
  - id: argus-curated-py-xxe-lxml
    languages: [python]
    severity: ERROR
    message: >
      XML is parsed with lxml without disabling entity resolution, exposing the
      app to XXE. Build an etree.XMLParser(resolve_entities=False,
      no_network=True) and pass it to parse/fromstring.
    metadata:
      cwe: "CWE-611: Improper Restriction of XML External Entity Reference"
      category: security
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: lxml.etree.parse($SRC)
          - pattern: lxml.etree.fromstring($SRC)
          - pattern: etree.parse($SRC)
          - pattern: etree.fromstring($SRC)
      - pattern-not: lxml.etree.parse($SRC, $PARSER)
      - pattern-not: lxml.etree.fromstring($SRC, $PARSER)
      - pattern-not: etree.parse($SRC, $PARSER)
      - pattern-not: etree.fromstring($SRC, $PARSER)
      - pattern-not: lxml.etree.parse($SRC, parser=$PARSER)
      - pattern-not: lxml.etree.fromstring($SRC, parser=$PARSER)
      - pattern-not: etree.parse($SRC, parser=$PARSER)
      - pattern-not: etree.fromstring($SRC, parser=$PARSER)
  - id: argus-curated-py-insecure-deserialization
    languages: [python]
    severity: ERROR
    message: >
      Deserializing untrusted data with pickle or an unsafe yaml.load allows
      arbitrary code execution. Use a safe format (json) or yaml.safe_load, and
      never unpickle attacker-controlled bytes.
    metadata:
      cwe: "CWE-502: Deserialization of Untrusted Data"
      category: security
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: pickle.loads($DATA)
          - pattern: pickle.load($DATA)
          - pattern: cPickle.loads($DATA)
          - pattern: cPickle.load($DATA)
          - pattern: yaml.load($DATA, ...)
      - pattern-not: yaml.load($DATA, Loader=yaml.SafeLoader)
      - pattern-not: yaml.load($DATA, Loader=yaml.CSafeLoader)
      - pattern-not: yaml.load($DATA, Loader=SafeLoader)
  - id: argus-curated-js-ssrf
    languages: [javascript, typescript]
    severity: ERROR
    message: >
      Server-Side Request Forgery: an HTTP request uses a URL taken directly
      from request input (req.query/req.body/req.params). An attacker can force
      the server to request internal or arbitrary hosts. Validate the URL
      against an allowlist before making the request.
    metadata:
      cwe: "CWE-918: Server-Side Request Forgery (SSRF)"
      category: security
      confidence: MEDIUM
    pattern-either:
      - pattern: axios.get(req.query.$P, ...)
      - pattern: axios.get(req.body.$P, ...)
      - pattern: axios.get(req.params.$P, ...)
      - pattern: fetch(req.query.$P, ...)
      - pattern: fetch(req.body.$P, ...)
      - pattern: fetch(req.params.$P, ...)
      - pattern: got(req.query.$P, ...)
      - pattern: got(req.body.$P, ...)
      - pattern: http.get(req.query.$P, ...)
      - pattern: http.get(req.body.$P, ...)
      - pattern: https.get(req.query.$P, ...)
      - pattern: https.get(req.body.$P, ...)
  - id: argus-curated-js-path-traversal
    languages: [javascript, typescript]
    severity: ERROR
    message: >
      Path Traversal: a filesystem read uses a path built from request input
      without sanitisation. An attacker can supply '../' sequences to read
      arbitrary files. Restrict to a safe base directory and use path.basename().
    metadata:
      cwe: "CWE-22: Improper Limitation of a Pathname to a Restricted Directory (Path Traversal)"
      category: security
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: fs.readFile(req.query.$P, ...)
          - pattern: fs.readFile(req.body.$P, ...)
          - pattern: fs.readFile(req.params.$P, ...)
          - pattern: fs.readFileSync(req.query.$P, ...)
          - pattern: fs.readFileSync(req.body.$P, ...)
          - pattern: fs.readFileSync(req.params.$P, ...)
          - pattern: fs.createReadStream(req.query.$P, ...)
          - pattern: fs.createReadStream(req.body.$P, ...)
          - pattern: fs.createReadStream(req.params.$P, ...)
      - pattern-not: fs.$F(path.basename(...), ...)
  - id: argus-curated-js-open-redirect
    languages: [javascript, typescript]
    severity: ERROR
    message: >
      Open Redirect: res.redirect() is called with a destination taken directly
      from request input. An attacker can craft a link that redirects victims to
      a malicious site. Validate the target against an allowlist before redirecting.
    metadata:
      cwe: "CWE-601: URL Redirection to Untrusted Site (Open Redirect)"
      category: security
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: res.redirect(req.query.$P)
          - pattern: res.redirect(req.body.$P)
          - pattern: res.redirect(req.params.$P)
          - pattern: res.redirect($CODE, req.query.$P)
          - pattern: res.redirect($CODE, req.body.$P)
          - pattern: res.redirect($CODE, req.params.$P)
      - pattern-not: res.redirect("...")
      - pattern-not: res.redirect($CODE, "...")
  - id: argus-curated-go-ssrf-request-from-variable
    languages: [go]
    severity: ERROR
    message: >
      HTTP request to a URL taken from a variable may allow Server-Side Request
      Forgery. Validate and allow-list the destination host before making the request.
    metadata:
      cwe: "CWE-918: Server-Side Request Forgery (SSRF)"
      category: security
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: http.Get($URL)
          - pattern: http.Post($URL, ...)
          - pattern: $CLIENT.Get($URL)
          - pattern: $CLIENT.Post($URL, ...)
      - pattern-not: http.Get("...")
      - pattern-not: http.Post("...", ...)
      - pattern-not: $CLIENT.Get("...")
      - pattern-not: $CLIENT.Post("...", ...)
  - id: argus-curated-go-path-traversal-join-input
    languages: [go]
    severity: ERROR
    message: >
      File path is built by joining untrusted input, which may allow path
      traversal outside the intended directory. Wrap user input with
      filepath.Base or validate it against an allow-list.
    metadata:
      cwe: "CWE-22: Improper Limitation of a Pathname to a Restricted Directory (Path Traversal)"
      category: security
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: os.Open(filepath.Join(...))
          - pattern: os.ReadFile(filepath.Join(...))
          - pattern: ioutil.ReadFile(filepath.Join(...))
      - pattern-not: os.Open(filepath.Join(..., filepath.Base(...)))
      - pattern-not: os.ReadFile(filepath.Join(..., filepath.Base(...)))
      - pattern-not: ioutil.ReadFile(filepath.Join(..., filepath.Base(...)))
  - id: argus-curated-go-tls-insecure-skip-verify
    languages: [go]
    severity: ERROR
    message: >
      Disabling certificate verification allows man-in-the-middle attacks.
      Remove InsecureSkipVerify or set it to false.
    metadata:
      cwe: "CWE-295: Improper Certificate Validation"
      category: security
      confidence: HIGH
    pattern: "tls.Config{..., InsecureSkipVerify: true, ...}"
  - id: argus-curated-java-ssrf-url-openconnection
    languages: [java]
    severity: ERROR
    message: >
      A URL built from a non-constant value is opened, allowing SSRF. Validate the
      host against an allowlist and reject internal/link-local addresses before
      opening the connection.
    metadata:
      cwe: "CWE-918: Server-Side Request Forgery (SSRF)"
      category: security
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: new URL($U).openConnection()
          - pattern: new URL($U).openStream()
          - patterns:
              - pattern: $C.openConnection()
              - pattern-inside: |
                  $C = new URL($U);
                  ...
          - patterns:
              - pattern: $C.openStream()
              - pattern-inside: |
                  $C = new URL($U);
                  ...
      - pattern-not: new URL("...").openConnection()
      - pattern-not: new URL("...").openStream()
      - metavariable-pattern:
          metavariable: $U
          patterns:
            - pattern-not: '"..."'
  - id: argus-curated-ruby-unsafe-yaml-load
    languages: [ruby]
    severity: ERROR
    message: >
      YAML.load / Marshal.load can instantiate arbitrary Ruby objects from
      untrusted input, leading to remote code execution. Use YAML.safe_load
      and never Marshal.load on request data.
    metadata:
      cwe: "CWE-502: Deserialization of Untrusted Data"
      category: security
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: YAML.load(params[$K])
          - pattern: YAML.load(request.$M)
          - pattern: Marshal.load(params[$K])
          - pattern: Marshal.load(request.$M)
      - pattern-not: YAML.safe_load(...)
  - id: argus-curated-php-unserialize-request
    languages: [php]
    severity: ERROR
    message: >
      unserialize() on request data can instantiate arbitrary objects and
      trigger PHP object injection. Use json_decode() for untrusted input.
    metadata:
      cwe: "CWE-502: Deserialization of Untrusted Data"
      category: security
      confidence: HIGH
    pattern-either:
      - pattern: unserialize($_GET[...])
      - pattern: unserialize($_POST[...])
      - pattern: unserialize($_REQUEST[...])
      - pattern: unserialize($_COOKIE[...])
  - id: argus-curated-php-weak-crypto
    languages: [php]
    severity: ERROR
    message: >
      Weak cryptography: mcrypt is deprecated/insecure, and DES or ECB-mode
      ciphers leak plaintext structure. Use openssl_encrypt with AES-GCM.
    metadata:
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      category: security
      confidence: MEDIUM
    pattern-either:
      - pattern: mcrypt_encrypt(...)
      - patterns:
          - pattern: openssl_encrypt($DATA, $CIPHER, ...)
          - metavariable-regex:
              metavariable: $CIPHER
              regex: '(?i)"[a-z0-9-]*(des|ecb)[a-z0-9-]*"'
  - id: argus-curated-php-ldap-injection
    languages: [php]
    severity: ERROR
    message: >
      LDAP search filter built from request input allows LDAP injection.
      Escape untrusted values with ldap_escape($v, "", LDAP_ESCAPE_FILTER).
    metadata:
      cwe: "CWE-90: Improper Neutralization of Special Elements used in an LDAP Query (LDAP Injection)"
      category: security
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: ldap_search($CONN, $BASE, <... $_GET[...] ...>)
          - pattern: ldap_search($CONN, $BASE, <... $_POST[...] ...>)
          - pattern: ldap_search($CONN, $BASE, <... $_REQUEST[...] ...>)
          - pattern: ldap_search($CONN, $BASE, <... $_COOKIE[...] ...>)
      - pattern-not: ldap_search($CONN, $BASE, <... ldap_escape(...) ...>)

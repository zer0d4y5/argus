# Dependabot keeps dependencies patched, which for a security tool is part of
# practicing what we preach. Every update arrives as a pull request, so it goes
# through the same review gate as any other change: a maintainer approves and
# CI passes before it merges. Nothing auto-merges.
version: 2
updates:
  # Go modules (the CLI + console backend).
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "go"]
    commit-message:
      prefix: "deps(go)"

  # The React/Vite console.
  - package-ecosystem: npm
    directory: "/ui"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "javascript"]
    commit-message:
      prefix: "deps(ui)"
    ignore:
      # Major-version bumps for the console toolchain (Tailwind, TypeScript,
      # Vite, React, and friends) each need a deliberate migration with a build
      # and browser check, not an unattended PR. Patch and minor updates still
      # come through here, and security fixes come through regardless.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # The GitHub Actions the CI workflow pins.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "deps(actions)"
